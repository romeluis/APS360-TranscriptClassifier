  "courses_per_semester": [4, 6],
  "semesters": [2, 6],
  "course_code_format": "3letter_3digit",
  "has_credits": false,

  "has_cumulative_gpa": false,

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academic Transcript - Gray Pass/Fail</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    @page {
      margin: 0.5in;
      size: letter;
    }
    body {
      font-family: 'Helvetica', sans-serif;
      background: white;
      color: #555;
      padding: 20px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
    }
    .header {
      padding: 20px;
      margin-bottom: 30px;
      border-bottom: 1px solid #999;
    }
    .header h1 {
      color: #555;
      font-size: 22px;
      margin-bottom: 15px;
      font-weight: normal;
    }
    .header-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      font-size: 12px;
    }
    .header-row {
      display: flex;
      gap: 30px;
    }
    .header-field {
      display: flex;
      flex-direction: column;
    }
    .header-label {
      color: #777;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 3px;
      font-weight: bold;
    }
    .header-value {
      color: #555;
    }
    .semester-block {
      margin-bottom: 30px;
      page-break-inside: avoid;
    }
    .semester-header {
      background: #f5f5f5;
      padding: 10px 15px;
      font-size: 13px;
      font-weight: bold;
      color: #555;
      border: 1px solid #ccc;
      margin-bottom: 10px;
    }
    .courses-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 15px;
    }
    .courses-table th {
      background: #f5f5f5;
      color: #555;
      padding: 8px 10px;
      text-align: left;
      font-size: 11px;
      font-weight: bold;
      border: 1px solid #ccc;
    }
    .courses-table td {
      padding: 8px 10px;
      border: 1px solid #ccc;
      font-size: 12px;
      color: #555;
    }
    .courses-table tbody tr:nth-child(even) {
      background: #fafafa;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>{INSTITUTION}</h1>
      <div class="header-info">
        <div class="header-field">
          <span class="header-label">Student Name</span>
          <span class="header-value">{STUDENT_NAME}</span>
        </div>
        <div class="header-field">
          <span class="header-label">Student ID</span>
          <span class="header-value">{STUDENT_ID}</span>
        </div>
        <div class="header-field">
          <span class="header-label">Program</span>
          <span class="header-value">{PROGRAM}</span>
        </div>
        <div class="header-field">
          <span class="header-label">Issue Date</span>
          <span class="header-value">{ISSUE_DATE}</span>
        </div>
      </div>
    </div>

    <!-- BEGIN:SEMESTER_BLOCK -->
    <div class="semester-block">
      <div class="semester-header">{NOISE_LINE}
{SEMESTER}
{SESSION_HEADER}</div>
      <table class="courses-table">
        <thead>
          <tr>
            <th>Code</th>
            <th>Course Name</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          <!-- BEGIN:COURSE_BLOCK -->
          <tr>
            <td>{CODE}</td>
            <td>{COURSE_NAME}</td>
            <td>{NUMERIC_MARK}</td>
        <td>{GRADE}</td>
          </tr>
          <!-- END:COURSE_BLOCK -->
        </tbody>
      </table>
    </div>
    <!-- END:SEMESTER_BLOCK -->
  </div>
</body>
</html>
