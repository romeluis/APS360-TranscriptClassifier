  "grade_scale": "letter",
  "courses_per_semester": [3, 6],
  "semesters": [2, 5],
  "course_code_format": "3letter_3digit",
  "has_credits": false,
  "has_semester_gpa": true,
  "has_cumulative_gpa": true,
  "has_standing": false,
  "credit_values": [3.0],
  "seasons": ["Fall", "Spring"],
  "year_range": [2020, 2026]
} -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academic Transcript</title>
  <style>
    @page {
      size: letter;
      margin: 0.75in;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: Helvetica, Arial, sans-serif;
      color: #333;
      line-height: 1.5;
      background-color: #fafafa;
    }
    .container {
      max-width: 8.5in;
      margin: 0 auto;
      background-color: white;
      padding: 24px;
    }
    .header {
      text-align: center;
      margin-bottom: 28px;
      padding-bottom: 18px;
      border-bottom: 3px solid #ef6c00;
    }
    .header h1 {
      color: #ef6c00;
      font-size: 26px;
      margin-bottom: 5px;
      font-weight: 600;
    }
    .header p {
      color: #666;
      font-size: 14px;
    }
    .student-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
      font-size: 13px;
    }
    .info-item {
      padding: 12px;
      background-color: #fff3e0;
      border-left: 4px solid #ef6c00;
      border-radius: 4px;
    }
    .info-label {
      font-weight: 600;
      color: #ef6c00;
      font-size: 11px;
      margin-bottom: 3px;
      display: block;
    }
    .info-value {
      color: #333;
    }
    .semester-card {
      background-color: white;
      border: 1px solid #ffe0b2;
      border-radius: 8px;
      margin-bottom: 20px;
      padding: 18px;
      page-break-inside: avoid;
      box-shadow: 0 1px 3px rgba(239, 108, 0, 0.08);
    }
    .semester-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 2px solid #ffe0b2;
    }
    .semester-name {
      font-size: 16px;
      font-weight: 600;
      color: #ef6c00;
    }
    .semester-gpa {
      background-color: #ef6c00;
      color: white;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }
    .courses-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .course-item {
      padding: 12px;
      background-color: #fafafa;
      border-radius: 6px;
      border: 1px solid #f0f0f0;
    }
    .course-code {
      font-weight: 600;
      color: #ef6c00;
      display: block;
      margin-bottom: 4px;
      font-size: 13px;
    }
    .course-name {
      color: #555;
      font-size: 12px;
      margin-bottom: 8px;
      display: block;
    }
    .course-grade {
      display: inline-block;
      background-color: #ef6c00;
      color: white;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }
    .cumulative-section {
      background-color: white;
      border: 1px solid #ffe0b2;
      border-radius: 8px;
      padding: 18px;
      margin-top: 25px;
      border-left: 4px solid #ef6c00;
    }
    .cumulative-title {
      font-weight: 600;
      color: #ef6c00;
      margin-bottom: 14px;
      font-size: 15px;
      padding-bottom: 10px;
      border-bottom: 2px solid #ffe0b2;
    }
    .cumulative-stats {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      font-size: 13px;
    }
    .stat-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
    }
    .stat-label {
      color: #333;
      font-weight: 500;
    }
    .stat-value {
      background-color: #ef6c00;
      color: white;
      padding: 4px 12px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Academic Transcript</h1>
      <p>{INSTITUTION}</p>
    </div>

    <div class="student-info">
      <div class="info-item">
        <span class="info-label">Student Name</span>
        <span class="info-value">{STUDENT_NAME}</span>
      </div>
      <div class="info-item">
        <span class="info-label">Student ID</span>
        <span class="info-value">{STUDENT_ID}</span>
      </div>
      <div class="info-item">
        <span class="info-label">Program</span>
        <span class="info-value">{PROGRAM}</span>
      </div>
      <div class="info-item">
        <span class="info-label">Issue Date</span>
        <span class="info-value">{ISSUE_DATE}</span>
      </div>
    </div>

    <!-- BEGIN:SEMESTER_BLOCK -->
    <div class="semester-card">
      <div class="semester-header">
        <span class="semester-name">{SEMESTER}</span>
        <span class="semester-gpa">GPA: {SEMESTER_GPA}</span>
      </div>
      <div class="courses-grid">
        <!-- BEGIN:COURSE_BLOCK -->
        <div class="course-item">
          <span class="course-code">{CODE}</span>
          <span class="course-name">{COURSE_NAME}</span>
          <span class="course-grade">{GRADE}</span>
        </div>
        <!-- END:COURSE_BLOCK -->
      </div>
    </div>
    <!-- END:SEMESTER_BLOCK -->

    <div class="cumulative-section">
      <div class="cumulative-title">Cumulative Summary</div>
      <div class="cumulative-stats">
        <div class="stat-item">
          <span class="stat-label">Cumulative GPA:</span>
          <span class="stat-value">{CUMULATIVE_GPA}</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
