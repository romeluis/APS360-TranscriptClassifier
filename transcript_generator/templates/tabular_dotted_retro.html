<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academic Transcript - Dotted Retro</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    @page {
      margin: 0.5in;
      size: letter;
    }
    body {
      font-family: 'Courier New', monospace;
      background: white;
      color: #000;
      padding: 20px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
    }
    .header {
      border: 3px dotted #000;
      padding: 15px;
      margin-bottom: 20px;
      text-align: center;
    }
    .header h1 {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .header-info {
      font-size: 11px;
      line-height: 1.6;
      text-align: center;
    }
    .header-row {
      margin: 4px 0;
    }
    .semester-block {
      margin-bottom: 25px;
      page-break-inside: avoid;
    }
    .semester-header {
      border: 2px dotted #000;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: bold;
      text-transform: uppercase;
      margin-bottom: 8px;
      background: white;
    }
    .courses-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 12px;
    }
    .courses-table th {
      border: 2px dotted #000;
      padding: 8px 10px;
      text-align: left;
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
      background: white;
    }
    .courses-table td {
      border: 2px dotted #000;
      padding: 8px 10px;
      font-size: 11px;
    }
    .summary {
      border: 3px dotted #000;
      padding: 12px;
      margin-top: 20px;
      text-align: center;
      font-size: 11px;
    }
    .summary-label {
      font-weight: bold;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .summary-value {
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>{INSTITUTION}</h1>
      <div class="header-info">
        <div class="header-row">STUDENT: {STUDENT_NAME}</div>
        <div class="header-row">ID: {STUDENT_ID}</div>
        <div class="header-row">PROGRAM: {PROGRAM}</div>
        <div class="header-row">ISSUED: {ISSUE_DATE}</div>
      </div>
    </div>

    <!-- BEGIN:SEMESTER_BLOCK -->
    <div class="semester-block">
      <div class="semester-header">{NOISE_LINE}
{SEMESTER}
{SESSION_HEADER}</div>
      <table class="courses-table">
        <thead>
          <tr>
            <th>CODE</th>
            <th>COURSE NAME</th>
            <th>STATUS</th>
          </tr>
        </thead>
        <tbody>
          <!-- BEGIN:COURSE_BLOCK -->
          <tr>
            <td>{CODE}</td>
            <td>{COURSE_NAME}</td>
            <td>{NUMERIC_MARK}</td>
        <td>{GRADE}</td>
          </tr>
          <!-- END:COURSE_BLOCK -->
        </tbody>
      </table>
    </div>
    <!-- END:SEMESTER_BLOCK -->

    <div class="summary">
      <div class="summary-label">CUMULATIVE STATUS</div>
      <div class="summary-value">
        GPA: {CUMULATIVE_GPA}
      </div>
    </div>
  </div>
</body>
</html>
