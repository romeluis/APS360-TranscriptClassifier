  "has_credits": false,
  "has_semester_gpa": true,
  "has_cumulative_gpa": true,

  "year_range": [2019, 2025]

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academic Transcript</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    @page {
      size: letter;
      margin: 1in;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      color: #222;
      line-height: 1.6;
      font-size: 11pt;
      background-color: #f9f9f9;
    }

    .container {
      max-width: 8.5in;
      margin: 0 auto;
      background-color: white;
      padding: 2rem;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .institution {
      font-size: 16pt;
      font-weight: 700;
      color: #4682b4;
      margin-bottom: 0.5rem;
    }

    .document-title {
      font-size: 12pt;
      color: #4682b4;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .student-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      font-size: 10pt;
      margin-bottom: 2rem;
      padding: 1.5rem;
      background-color: #e8f4f8;
      border-radius: 4px;
      border-left: 4px solid #4682b4;
    }

    .info-row {
      display: flex;
      flex-direction: column;
    }

    .info-label {
      font-weight: 700;
      color: #4682b4;
      margin-bottom: 0.2rem;
      font-size: 9pt;
    }

    .info-value {
      color: #222;
      font-size: 10pt;
    }

    .semester-block {
      margin-bottom: 2rem;
      page-break-inside: avoid;
    }

    .semester-header {
      background-color: #4682b4;
      color: white;
      padding: 0.8rem 1rem;
      margin-bottom: 1rem;
      font-weight: 700;
      font-size: 11pt;
      border-radius: 3px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .semester-name {
      flex: 1;
    }

    .counter {
      font-size: 9pt;
      opacity: 0.9;
    }

    .course-list {
      counter-reset: course-counter;
      padding-left: 0;
      list-style: none;
    }

    .course-block {
      display: flex;
      align-items: flex-start;
      margin-bottom: 0.8rem;
      padding: 0.6rem 1rem;
      background-color: #f5f5f5;
      border-radius: 3px;
      font-size: 10pt;
    }

    .course-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      height: 28px;
      background-color: #4682b4;
      color: white;
      border-radius: 50%;
      font-weight: bold;
      font-size: 9pt;
      margin-right: 1rem;
      flex-shrink: 0;
    }

    .course-block::before {
      content: counter(course-counter);
      counter-increment: course-counter;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      height: 28px;
      background-color: #4682b4;
      color: white;
      border-radius: 50%;
      font-weight: bold;
      font-size: 9pt;
      margin-right: 1rem;
      flex-shrink: 0;
    }

    .course-info {
      flex: 1;
    }

    .course-code {
      display: inline;
      font-weight: 700;
      color: #4682b4;
      margin-right: 0.5rem;
    }

    .course-name {
      display: inline;
      color: #333;
    }

    .course-grade {
      display: block;
      margin-top: 0.3rem;
      font-size: 9pt;
      color: #666;
    }

    .semester-stats {
      margin-top: 1rem;
      padding: 0.6rem 1rem;
      background-color: #e8f4f8;
      border-left: 3px solid #4682b4;
      font-size: 9pt;
      color: #333;
    }

    .standing {
      margin-top: 0.3rem;
      color: #4682b4;
      font-weight: 600;
    }

    .summary-section {
      margin-top: 2rem;
      padding: 1.5rem;
      background-color: #e8f4f8;
      border-radius: 4px;
      border-left: 4px solid #4682b4;
    }

    .summary-title {
      font-weight: 700;
      color: #4682b4;
      margin-bottom: 1rem;
      font-size: 11pt;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.5rem;
      font-size: 10pt;
    }

    .summary-label {
      font-weight: 700;
      color: #333;
    }

    .summary-value {
      color: #4682b4;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="institution">{INSTITUTION}</div>
      <div class="document-title">Academic Transcript</div>
    </header>

    <div class="student-info">
      <div class="info-row">
        <span class="info-label">STUDENT NAME</span>
        <span class="info-value">{STUDENT_NAME}</span>
      </div>
      <div class="info-row">
        <span class="info-label">STUDENT ID</span>
        <span class="info-value">{STUDENT_ID}</span>
      </div>
      <div class="info-row">
        <span class="info-label">PROGRAM</span>
        <span class="info-value">{PROGRAM}</span>
      </div>
      <div class="info-row">
        <span class="info-label">DATE ISSUED</span>
        <span class="info-value">{ISSUE_DATE}</span>
      </div>
    </div>

    <!-- BEGIN:SEMESTER_BLOCK -->
    <div class="semester-block">
      <div class="semester-header">
        <span class="semester-name">{SEMESTER}</span>
      </div>

      <div class="course-list">
        <!-- BEGIN:COURSE_BLOCK -->
        <div class="course-block">
          <div class="course-info">
            <span class="course-code">{CODE}</span>
            <span class="course-name">{COURSE_NAME}</span>
            <div class="course-grade">Grade: {GRADE}</div>
          </div>
        </div>
        <!-- END:COURSE_BLOCK -->
      </div>

      <div class="semester-stats">
        Semester GPA: {SEMESTER_GPA}
        <div class="standing">{STANDING}</div>
      </div>
    </div>
    <!-- END:SEMESTER_BLOCK -->

    <div class="summary-section">
      <div class="summary-title">Academic Summary</div>
      <div class="summary-row">
        <span class="summary-label">Cumulative GPA:</span>
        <span class="summary-value">{CUMULATIVE_GPA}</span>
      </div>
    </div>
  </div>
</body>
</html>
