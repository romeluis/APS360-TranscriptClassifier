  "courses_per_semester": [5, 8],
  "semesters": [6, 12],
  "course_code_format": "3letter_3digit",
  "has_credits": true,
  "has_semester_gpa": true,
  "has_cumulative_gpa": true,

  "credit_values": [0.5, 1.0, 1.5],

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academic Transcript</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    @page {
      size: letter;
      margin: 0.5in;
    }

    body {
      font-family: Arial, sans-serif;
      color: #222;
      line-height: 1.3;
      font-size: 7.5pt;
      background-color: white;
    }

    .container {
      max-width: 8.5in;
      margin: 0 auto;
      padding: 0.3rem;
    }

    header {
      text-align: center;
      margin-bottom: 0.5rem;
    }

    .institution {
      font-size: 8pt;
      font-weight: bold;
      margin-bottom: 0.1rem;
    }

    .document-title {
      font-size: 7pt;
      color: #555;
    }

    .student-info {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 0.2rem;
      font-size: 6.5pt;
      margin-bottom: 0.4rem;
      padding: 0.2rem;
      background-color: #f5f5f5;
    }

    .info-row {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .info-label {
      font-weight: bold;
      color: #666;
      font-size: 6pt;
      margin-bottom: 0.1rem;
    }

    .info-value {
      word-break: break-word;
      font-size: 6.5pt;
    }

    .semester-block {
      margin-bottom: 0.4rem;
      page-break-inside: avoid;
    }

    .semester-header {
      background-color: #ddd;
      padding: 0.15rem 0.2rem;
      margin-bottom: 0.2rem;
      font-weight: bold;
      font-size: 7pt;
      border-bottom: 1px solid #999;
    }

    .course-block {
      display: flex;
      margin-bottom: 0.15rem;
      font-size: 6.5pt;
      padding: 0 0.2rem;
      gap: 0.2rem;
    }

    .course-code {
      display: inline-block;
      min-width: 50px;
      font-weight: bold;
      word-break: break-word;
      flex-shrink: 0;
    }

    .course-name {
      display: inline-block;
      min-width: 120px;
      word-break: break-word;
      flex: 1;
    }

    .course-credits {
      display: inline-block;
      min-width: 25px;
      text-align: right;
      flex-shrink: 0;
    }

    .course-grade {
      display: inline-block;
      min-width: 25px;
      text-align: center;
      font-weight: bold;
      flex-shrink: 0;
    }

    .semester-stats {
      margin-top: 0.15rem;
      padding: 0.1rem 0.2rem;
      font-size: 6pt;
      color: #666;
      background-color: #f9f9f9;
    }

    .summary-section {
      margin-top: 0.5rem;
      padding: 0.2rem;
      border-top: 1px solid #999;
      font-size: 7pt;
    }

    .summary-title {
      font-weight: bold;
      margin-bottom: 0.2rem;
      font-size: 6.5pt;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.1rem;
      font-size: 6.5pt;
    }

    .summary-label {
      font-weight: bold;
      min-width: 100px;
    }

    .summary-value {
      text-align: right;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="institution">{INSTITUTION}</div>
      <div class="document-title">TRANSCRIPT</div>
    </header>

    <div class="student-info">
      <div class="info-row">
        <span class="info-label">Name</span>
        <span class="info-value">{STUDENT_NAME}</span>
      </div>
      <div class="info-row">
        <span class="info-label">ID</span>
        <span class="info-value">{STUDENT_ID}</span>
      </div>
      <div class="info-row">
        <span class="info-label">Program</span>
        <span class="info-value">{PROGRAM}</span>
      </div>
      <div class="info-row">
        <span class="info-label">Issued</span>
        <span class="info-value">{ISSUE_DATE}</span>
      </div>
    </div>

    <!-- BEGIN:SEMESTER_BLOCK -->
    <div class="semester-block">
      <div class="semester-header">
        {SEMESTER}
      </div>

      <!-- BEGIN:COURSE_BLOCK -->
      <div class="course-block">
        <span class="course-code">{CODE}</span>
        <span class="course-name">{COURSE_NAME}</span>
        <span class="course-credits">{CREDITS}</span>
        <span class="course-grade">{GRADE}</span>
      </div>
      <!-- END:COURSE_BLOCK -->

      <div class="semester-stats">
        GPA: {SEMESTER_GPA}
      </div>
    </div>
    <!-- END:SEMESTER_BLOCK -->

    <div class="summary-section">
      <div class="summary-title">Summary</div>
      <div class="summary-row">
        <span class="summary-label">Cumulative GPA:</span>
        <span class="summary-value">{CUMULATIVE_GPA}</span>
      </div>
      <div class="summary-row">
        <span class="summary-label">Total Credits:</span>
        <span class="summary-value">{TOTAL_CREDITS}</span>
      </div>
    </div>
  </div>
</body>
</html>
