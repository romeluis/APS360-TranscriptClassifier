<!--CONFIG {
    "grade_scale": "percentage",
    "courses_per_semester": [3, 5],
    "semesters": [2, 4],
    "course_code_format": "3letter_3digit",
    "has_credits": false,
    "has_semester_gpa": false,
    "has_cumulative_gpa": true,
    "has_standing": false,
    "credit_values": [3.0],
    "seasons": ["S1", "S2"],
    "year_range": [2021, 2026]
} -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Transcript</title>
    <style>
        @page {
            size: A4;
            margin: 1in;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            color: #000;
            background: #fff;
        }

        .container {
            max-width: 8.5in;
            text-align: left;
        }

        .institution {
            font-size: 16pt;
            font-weight: bold;
            margin-bottom: 12px;
            margin-top: 0;
        }

        .student-name {
            font-size: 12pt;
            font-weight: bold;
            margin-bottom: 8px;
            margin-top: 8px;
        }

        .student-info {
            font-size: 10pt;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .info-item {
            margin-bottom: 4px;
        }

        .semester-container {
            margin-bottom: 24px;
            page-break-inside: avoid;
        }

        .semester-header {
            font-size: 11pt;
            font-weight: bold;
            margin-bottom: 12px;
            margin-top: 16px;
        }

        .course-list {
            margin-left: 0;
            font-size: 10pt;
            line-height: 1.3;
        }

        .course-item {
            margin-bottom: 6px;
            display: flex;
            gap: 12px;
        }

        .course-code {
            font-weight: bold;
            min-width: 80px;
        }

        .course-name {
            flex: 1;
        }

        .course-grade {
            min-width: 40px;
            text-align: right;
        }

        .summary {
            margin-top: 24px;
            font-size: 10pt;
            line-height: 1.4;
        }

        .summary-item {
            margin-bottom: 6px;
        }

        .summary-label {
            font-weight: bold;
            display: inline;
        }

        .summary-value {
            display: inline;
        }

        .issue-date {
            margin-top: 20px;
            font-size: 9pt;
            margin-bottom: 0;
        }
    </style>
</head>
<body>


<div class="container">
    <div class="institution">{INSTITUTION}</div>

    <div class="student-name">{STUDENT_NAME}</div>

    <div class="student-info">
        <div class="info-item">Student ID: {STUDENT_ID}</div>
        <div class="info-item">Program: {PROGRAM}</div>
    </div>

    <!-- BEGIN:SEMESTER_BLOCK -->
    <div class="semester-container">
        <div class="semester-header">{NOISE_LINE}
{SEMESTER}
{SESSION_HEADER}</div>

        <div class="course-list">
            <!-- BEGIN:COURSE_BLOCK -->
            <div class="course-item">
                <div class="course-code">{CODE}</div>
                <div class="course-name">{COURSE_NAME}</div>
                <div class="course-grade">{GRADE}</div>
            </div>
            <!-- END:COURSE_BLOCK -->
        </div>
    </div>
    <!-- END:SEMESTER_BLOCK -->

    <div class="summary">
        <div class="summary-item">
            <span class="summary-label">Cumulative GPA:</span>
            <span class="summary-value">{CUMULATIVE_GPA}</span>
        </div>
    </div>

    <div class="issue-date">Issued: {ISSUE_DATE}</div>
</div>

</body>
</html>
