<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academic Transcript</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    @page {
      size: letter;
      margin: 1in;
    }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: #333;
      line-height: 1.5;
      font-size: 11pt;
      background-color: #f5f5f5;
    }

    .container {
      max-width: 8.5in;
      margin: 0 auto;
      background-color: white;
      padding: 2rem;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .institution {
      font-size: 16pt;
      font-weight: 600;
      color: #00897b;
      margin-bottom: 0.5rem;
    }

    .document-title {
      font-size: 13pt;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .student-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      font-size: 10pt;
      margin-bottom: 2rem;
      padding: 1rem;
      background-color: #f0f0f0;
      border-radius: 4px;
    }

    .info-row {
      display: flex;
    }

    .info-label {
      font-weight: 600;
      color: #00897b;
      margin-right: 0.5rem;
      min-width: 80px;
    }

    .semester-block {
      margin-bottom: 1.8rem;
      page-break-inside: avoid;
      border-left: 3px solid #00897b;
      padding-left: 1.2rem;
    }

    .semester-header {
      margin-bottom: 1rem;
      font-size: 11pt;
      font-weight: 600;
    }

    .semester-name {
      color: #00897b;
      font-weight: 700;
    }

    .semester-year {
      color: #999;
      font-size: 10pt;
      margin-left: 0.5rem;
    }

    .course-block {
      display: flex;
      align-items: center;
      margin-bottom: 0.7rem;
      padding-left: 30px;
      font-size: 10pt;
    }

    .course-code {
      display: inline-block;
      font-weight: 600;
      color: #00897b;
      min-width: 80px;
    }

    .course-name {
      display: inline-block;
      flex: 1;
      padding: 0 1rem;
    }

    .course-grade {
      display: inline-block;
      text-align: right;
      min-width: 60px;
      font-weight: 600;
      color: #00897b;
    }

    .semester-stats {
      margin-top: 0.8rem;
      padding-left: 30px;
      font-size: 9pt;
      color: #666;
    }

    .summary-section {
      margin-top: 2rem;
      padding: 1.5rem;
      background-color: #e0f2f1;
      border-radius: 4px;
      border-left: 4px solid #00897b;
    }

    .summary-title {
      font-weight: 600;
      color: #00897b;
      margin-bottom: 0.8rem;
      font-size: 11pt;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.4rem;
      font-size: 10pt;
    }

    .summary-label {
      font-weight: 600;
    }

    .summary-value {
      color: #00897b;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="institution">{INSTITUTION}</div>
      <div class="document-title">Academic Transcript</div>
    </header>

    <div class="student-info">
      <div class="info-row">
        <span class="info-label">Name:</span>
        <span>{STUDENT_NAME}</span>
      </div>
      <div class="info-row">
        <span class="info-label">Student ID:</span>
        <span>{STUDENT_ID}</span>
      </div>
      <div class="info-row">
        <span class="info-label">Program:</span>
        <span>{PROGRAM}</span>
      </div>
      <div class="info-row">
        <span class="info-label">Date Issued:</span>
        <span>{ISSUE_DATE}</span>
      </div>
    </div>

    <!-- BEGIN:SEMESTER_BLOCK -->
    <div class="semester-block">
      <div class="semester-header">
        <span class="semester-name">{NOISE_LINE}
{SEMESTER}
{SESSION_HEADER}</span>
      </div>

      <!-- BEGIN:COURSE_BLOCK -->
      <div class="course-block">
        <span class="course-code">{CODE}</span>
        <span class="course-name">{COURSE_NAME}</span>
        <span class="course-grade">{GRADE}%</span>
      </div>
      <!-- END:COURSE_BLOCK -->

      <div class="semester-stats">
        Semester GPA: {SEMESTER_GPA}
      </div>
    </div>
    <!-- END:SEMESTER_BLOCK -->

    <div class="summary-section">
      <div class="summary-title">Transcript Summary</div>
      <div class="summary-row">
        <span class="summary-label">Cumulative GPA:</span>
        <span class="summary-value">{CUMULATIVE_GPA}</span>
      </div>
    </div>
  </div>
</body>
</html>
